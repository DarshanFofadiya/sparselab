# Run the pytest suite on all three supported CI platforms.
#
# Why this workflow exists
# ────────────────────────
# Our `wheels.yml` builds distributable wheels across macOS arm64,
# Linux x86_64, and Linux aarch64, but doesn't run the full pytest
# suite inside each wheel's environment. For kernel work
# (especially the AVX2 port in issue #2) we need the 442-test
# matrix to run on real x86 and aarch64 Linux hardware before we
# trust any kernel change on those platforms.
#
# This workflow is the missing "it works on Linux" signal.
#
# When it runs
# ────────────
# - Push to main: yes, automatically. Catches regressions per commit.
# - Pull request: yes. Contributor PRs get validated on all
#   three platforms before review.
# - Manual dispatch: also available for ad-hoc re-runs.
#
# Duration
# ────────
# ~4-5 minutes per matrix row. Jobs run in parallel so wall time
# is ~5 min regardless of matrix size.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.label }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    # Job-level env so the workaround applies to BOTH the verify step
    # and the pytest step — the OMP error fires on any sparselab import,
    # not just in pytest. Tracked in issue #18.
    env:
      KMP_DUPLICATE_LIB_OK: "TRUE"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon macOS arm64 — NEON path.
          # continue-on-error because editable installs on this
          # runner hit the double-libomp issue tracked in #18. The
          # KMP_DUPLICATE_LIB_OK workaround gets us past the abort
          # but downstream behavior (segfaults under some imports)
          # remains undefined. Not blocking for main kernel validation
          # since our shipped wheel works correctly (different build
          # path, different linkage). Revisit when #18 is fixed.
          - os: macos-14
            label: macOS-arm64
            python: "3.11"
            continue-on-error: true
          # Linux x86_64 — AVX2 path (per setup.py's IS_X86_64 branch).
          - os: ubuntu-24.04
            label: Linux-x86_64
            python: "3.11"
            continue-on-error: false
          # Linux aarch64 (Graviton-class) — NEON path on non-Apple.
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            python: "3.11"
            continue-on-error: false
    continue-on-error: ${{ matrix.continue-on-error }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install libomp (macOS only)
        # macOS Apple Clang ships without OpenMP by default; libomp
        # is the Homebrew package that supplies it. On Linux, gcc/
        # clang support -fopenmp directly without extra packages.
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install SparseLab and dev dependencies
        # Editable install so the compiled extension lives alongside
        # the source; runs on the current branch's kernel code.
        # --no-build-isolation uses the system Python's torch / pybind11
        # rather than spinning up a clean build environment each time —
        # ~2× faster on CI and matches what contributors do locally.
        #
        # ARCHFLAGS on macOS forces a single-arch build. GitHub's
        # macos-14 runners install a universal2 Python by default,
        # which would cause pip to try to build extensions for BOTH
        # arm64 AND x86_64 slices — the x86_64 slice fails because
        # our NEON sources (guarded by __ARM_NEON) don't compile on
        # x86. We set ARCHFLAGS=-arch arm64 to build only the native
        # slice for the Apple Silicon runner.
        env:
          ARCHFLAGS: ${{ runner.os == 'macOS' && '-arch arm64' || '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] -v

      - name: Inspect editable .so linkage (macOS diagnostic for #18)
        # Diagnostic-only step. Prints the macOS .so's linked dylibs
        # and rpath search list, plus the runtime torch path. Used to
        # determine which of the candidate libomp the loader is
        # actually resolving to in the editable-install path. No
        # behavior change; `set +e` so a missing .so doesn't kill the
        # job before the verify step runs.
        if: runner.os == 'macOS'
        run: |
          set +e
          SO=$(find sparselab -name "_core*.so" -print -quit)
          echo "── .so path: $SO"
          echo "── otool -L (linked dylibs):"
          otool -L "$SO" | sed 's/^/   /'
          echo "── otool -l | LC_RPATH (runtime search paths, in order):"
          otool -l "$SO" | awk '/cmd LC_RPATH/{getline; getline; print "   " $0}'
          echo "── runtime torch:"
          python -c "import torch, os; print(' ', torch.__file__); print(' ', os.path.join(os.path.dirname(torch.__file__), 'lib'))"
          echo "── DYLD-loaded libomp candidates that exist on disk:"
          for p in \
            "/opt/homebrew/opt/libomp/lib/libomp.dylib" \
            "$(python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib", "libomp.dylib"))')" ; do
            if [ -f "$p" ]; then
              echo "   present: $p"
              shasum -a 256 "$p" | sed 's/^/     sha256: /'
            else
              echo "   absent : $p"
            fi
          done

      - name: Verify install + SIMD path
        # Sanity-check: the right SIMD kernel is wired up on this
        # platform. Prints a one-line status the artifact can grep.
        run: |
          python -c "
          import platform
          import sparselab
          from sparselab import _core
          print(f'sparselab version: {sparselab.__version__}')
          print(f'platform: {platform.machine()}')
          print(f'spmm_grad_w    : {_core.spmm_grad_w}')
          print(f'spmm_grad_w_simd: {_core.spmm_grad_w_simd}')
          # Quick smoke test: same shape as the profiler uses.
          import torch
          torch.manual_seed(42)
          W_dense = torch.randn(32, 32) * (torch.rand(32, 32) >= 0.5).float()
          W = sparselab.PaddedCSR.from_dense(W_dense)
          X = torch.randn(32, 16).numpy()
          dY = torch.randn(32, 16).numpy()
          s = _core.spmm_grad_w(W, dY, X)
          v = _core.spmm_grad_w_simd(W, dY, X)
          print(f'scalar / simd shapes: {s.shape} / {v.shape}')
          import numpy as np
          print(f'scalar vs simd max abs diff: {np.max(np.abs(s-v)):.3e}')
          "

      - name: Run pytest
        # KMP_DUPLICATE_LIB_OK set at job level above — see note there
        # and issue #18. Leaving this comment here so future readers
        # see the cross-reference when they wonder why the env var
        # exists.
        run: pytest tests/ -v --tb=short
